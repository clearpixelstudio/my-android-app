# Netlify config for frontend-only deployment
# Deploy: netlify deploy --dir=frontend --prod

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build]
  publish = "frontend"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Cache-Control = "public, max-age=3600"
