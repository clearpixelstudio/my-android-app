name: Build Signed Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" 2>/dev/null || true
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Generate Gradle 8.4 Wrapper
        run: |
          if [ ! -f "gradlew" ]; then
            echo "Downloading Gradle 8.4..."
            curl -fsSL https://services.gradle.org/distributions/gradle-8.4-bin.zip -o /tmp/gradle.zip
            unzip -q /tmp/gradle.zip -d /tmp/gd
            /tmp/gd/gradle-8.4/bin/gradle wrapper \
              --gradle-version=8.4 \
              --distribution-type=bin \
              --project-dir="$GITHUB_WORKSPACE"
          fi
          chmod +x gradlew
          echo "=== Wrapper ready ==="
          ls -la gradlew gradle/wrapper/ 2>/dev/null || true

      - name: Generate signing keystore
        run: |
          mkdir -p app/keystore
          keytool -genkeypair \
            -keystore app/keystore/release.jks \
            -storepass "Tanvir@786" \
            -keypass "Tanvir@786" \
            -alias "Appkye" \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -dname "CN=My App, O=App, C=US" 2>/dev/null
          echo "Keystore ready: $(ls -lh app/keystore/release.jks)"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*','**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace 2>&1

      - name: List generated APKs
        run: find . -name "*.apk" -type f | head -10

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30
