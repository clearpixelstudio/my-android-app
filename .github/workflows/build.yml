name: "⚡ APK Factory — Shopindia Final Build"

on:
  push:
    branches:
      - "main"
      - "master"
  workflow_dispatch:

env:
  JAVA_VER: '17'
  GRADLE_VER: '8.4'
  COMPILE_SDK: '34'
  BUILD_TOOLS: '34.0.0'

jobs:
  build:
    name: "Build Shopindia Final APK"
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "☕ JDK 17"
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: "🔧 Install Gradle 8.4"
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: "🤖 Android SDK"
        uses: android-actions/setup-android@v3

      - name: "✅ Accept Licenses + Install SDK"
        run: |
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>/dev/null || true

      - name: "🏗️ Generate Gradle Wrapper (Zero-Fail)"
        run: |
          echo "🔧 Generating Gradle 8.4 wrapper..."
          gradle wrapper --gradle-version=8.4 --distribution-type=bin
          chmod +x gradlew
          echo "✅ Wrapper ready: $(ls -la gradlew gradle/wrapper/)"

      - name: "🔑 Auto Debug Keystore"
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -v \
            -keystore ~/.android/debug.keystore \
            -storepass android -alias androiddebugkey \
            -keypass android -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" 2>/dev/null || true

      - name: "🏭 Build Release APK"
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: "🏭 Build Release AAB"
        run: ./gradlew bundleRelease --no-daemon --stacktrace

      - name: "📦 Upload Release APK"
        uses: actions/upload-artifact@v4
        with:
          name: APK-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: "📦 Upload AAB"
        uses: actions/upload-artifact@v4
        with:
          name: AAB-release
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 30
          if-no-files-found: ignore