name: "⚡ APK Factory — My App Build"

on:
  push:
    branches:
      - "main"
      - "master"
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  GRADLE_VERSION: '8.4'

jobs:
  build:
    name: "Build My App APK"
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "☕ Setup JDK 17"
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: "🔧 Setup Gradle 8.4"
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: "🤖 Setup Android SDK"
        uses: android-actions/setup-android@v3

      - name: "✅ Accept SDK Licenses"
        run: yes | sdkmanager --licenses 2>/dev/null || true

      - name: "📦 Install SDK Components"
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>/dev/null || true

      - name: "🏗️ Generate Gradle Wrapper if Missing"
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "⚡ Generating Gradle wrapper..."
            gradle wrapper --gradle-version=8.4 --distribution-type=bin
          fi

      - name: "🔑 Create Debug Keystore"
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -v \
            -keystore ~/.android/debug.keystore \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" 2>/dev/null || true

      - name: "🔓 Make gradlew executable"
        run: chmod +x gradlew

      - name: "🏭 Build Release APK"
        run: ./gradlew assembleRelease --no-daemon --stacktrace --parallel

      - name: "🏭 Build Release AAB"
        run: ./gradlew bundleRelease --no-daemon --stacktrace --parallel

      - name: "📦 Upload Release APK"
        uses: actions/upload-artifact@v4
        with:
          name: APK-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: "📦 Upload Release AAB"
        uses: actions/upload-artifact@v4
        with:
          name: AAB-release
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 30
          if-no-files-found: ignore